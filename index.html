<body class="bg-kaiYellow font-sans">
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;

// ─────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────
const LOGO_URL = "https://raw.githubusercontent.com/bopde/Kai-Ika-report/main/KAI-IKA_log_white-on-trans01.png";
const WEB_APP_KEY  = "coffeeCartWebAppUrl";
const EVENT_KEY    = "coffeeCartEvent";

const STAFF = ["Ben","Connor","Dave","Opu","Matt","Jay","Xavier","Volunteer","Other"];

const STOCK_ITEMS = [
  "Cup - Lg","Cup - Sm","Milk - Cow 2L","Milk - Oat 1L",
  "Beans - 1kg","Chocolate powder - bag","Chocolate sauce - 500ml bottle",
  "Tea - box","Iced Coffee - can","Coke","Sprite","Coke Zero","L&P"
];

// POS menu items — each is a single, tappable product
// altMilk: true  → has alt milk modifier (+$1)
// cup: 'lg'|'sm' → auto-assign cup
// milk: ml       → cow milk used (if not alt milk order)
// beans: g       → coffee beans used
// stockKey        → which stock item to decrement (drinks)
const MENU = [
  { id:"wc_sm",  label:"White Coffee",        size:"Rg", price:6,  altMilk:true, cup:"sm", milk:300, beans:19, cat:"coffee" },
  { id:"wc_lg",  label:"White Coffee",        size:"Lg", price:7,  altMilk:true, cup:"lg", milk:300, beans:19, cat:"coffee" },
  { id:"bc_sm",  label:"Black Coffee",        size:"Rg", price:5,  altMilk:false,cup:"sm", milk:0,   beans:19, cat:"coffee" },
  { id:"bc_lg",  label:"Black Coffee",        size:"Lg", price:5,  altMilk:false,cup:"lg", milk:0,   beans:19, cat:"coffee" },
  { id:"hc_sm",  label:"Hot Choc",            size:"Rg", price:6,  altMilk:true, cup:"sm", milk:300, beans:0,  cat:"hot" },
  { id:"hc_lg",  label:"Hot Choc",            size:"Lg", price:7,  altMilk:true, cup:"lg", milk:300, beans:0,  cat:"hot" },
  { id:"tea_sm", label:"Tea",                 size:"Rg", price:5,  altMilk:false,cup:"sm", milk:0,   beans:0,  cat:"hot" },
  { id:"tea_lg", label:"Tea",                 size:"Lg", price:5,  altMilk:false,cup:"lg", milk:0,   beans:0,  cat:"hot" },
  { id:"ic",     label:"Iced Coffee",         size:"",   price:5,  altMilk:false,cup:null, milk:0,   beans:0,  cat:"cold", stockKey:"Iced Coffee - can" },
  { id:"coke",   label:"Coke",                size:"",   price:3,  altMilk:false,cup:null, milk:0,   beans:0,  cat:"cold", stockKey:"Coke" },
  { id:"sprite", label:"Sprite",              size:"",   price:3,  altMilk:false,cup:null, milk:0,   beans:0,  cat:"cold", stockKey:"Sprite" },
  { id:"lp",     label:"L&P",                 size:"",   price:3,  altMilk:false,cup:null, milk:0,   beans:0,  cat:"cold", stockKey:"L&P" },
  { id:"other",  label:"Coffee - Other",      size:"",   price:0,  altMilk:false,cup:"sm", milk:0,   beans:19, cat:"other", customPrice:true },
  { id:"donate", label:"Donation",            size:"",   price:0,  altMilk:false,cup:null, milk:0,   beans:0,  cat:"other", customPrice:true },
];

const CAT_LABELS = { coffee:"Coffee", hot:"Hot Drinks", cold:"Cold Drinks", other:"Other" };
const CAT_ORDER  = ["coffee","hot","cold","other"];

// Map menu ids back to the Sales Report product names
const MENU_TO_REPORT = {
  wc_sm:"White Coffee - Rg", wc_lg:"White Coffee - Lg",
  bc_sm:"Black Coffee - Rg", bc_lg:"Black Coffee - Lg",
  hc_sm:"Hot Choc - Rg",     hc_lg:"Hot Choc - Lg",
  tea_sm:"Tea - Rg",         tea_lg:"Tea - Lg",
  ic:"Iced Coffee - Can",    coke:"Coke",
  sprite:"Sprite",           lp:"L&P",
  other:"Coffee - Other",    donate:"Donation",
};

const ALL_REPORT_PRODUCTS = [
  "White Coffee - Rg","White Coffee - Lg",
  "Black Coffee - Rg","Black Coffee - Lg",
  "Hot Choc - Rg","Hot Choc - Lg",
  "Alt Milk","Coke","Iced Coffee - Can",
  "Tea - Rg","Tea - Lg",
  "Coffee - Other","Donation"
];

// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────
const fmt  = n => `$${parseFloat(n||0).toFixed(2)}`;
const todayStr = () => new Date().toISOString().slice(0,10);
const nowTime  = () => new Date().toTimeString().slice(0,5);
const uid  = () => Math.random().toString(36).slice(2,8);
const hasData = v => v !== null && v !== undefined && v !== "" && v !== "0" && v !== 0;

function loadEvent()  { try { return JSON.parse(localStorage.getItem(EVENT_KEY)); } catch{ return null; } }
function saveEvent(e) { localStorage.setItem(EVENT_KEY, JSON.stringify(e)); }
function clearEvent() { localStorage.removeItem(EVENT_KEY); }

// Build a blank event object
function blankEvent() {
  return {
    id: uid(),
    date: todayStr(),
    eventName: "",
    location: "",
    completedBy: "",
    staffRows: [],
    orders: [],           // POS orders
    // overrides (user can edit)
    salesOverride: null,  // null = auto from POS
    stockOverride: null,  // null = auto from POS
    cashSales: "",
    eftposSales: "",
    fridgeReadings: [],
    crowdNotes: "",
    equipmentIssues: "",
    legaseaSignups: "",
    notes: "",
  };
}

// Derive totals from orders
function deriveSalesFromOrders(orders) {
  const paid = orders.filter(o => o.status === "paid");
  const qtyMap = {};
  let altMilkCount = 0;

  paid.forEach(order => {
    order.items.forEach(item => {
      const reportName = MENU_TO_REPORT[item.menuId];
      if (reportName) qtyMap[reportName] = (qtyMap[reportName]||0) + item.qty;
      if (item.altMilk) altMilkCount += item.qty;
    });
  });

  if (altMilkCount > 0) qtyMap["Alt Milk"] = altMilkCount;
  return qtyMap;
}

// Derive stock used from orders (auto)
function deriveStockFromOrders(orders) {
  const paid = orders.filter(o => o.status === "paid");
  let cowMilkMl = 0, oatMilkMl = 0, beansG = 0;
  let cupsLg = 0, cupsSm = 0;
  const itemStock = {}; // for cans / bottles with explicit stockKey

  paid.forEach(order => {
    order.items.forEach(item => {
      const def = MENU.find(m => m.id === item.menuId);
      if (!def) return;

      const qty = item.qty;
      if (def.beans > 0) beansG += def.beans * qty;
      if (item.altMilk) {
        oatMilkMl += def.milk * qty;
      } else {
        cowMilkMl += def.milk * qty;
      }
      if (def.cup === "lg") cupsLg += qty;
      if (def.cup === "sm") cupsSm += qty;
      if (def.stockKey) itemStock[def.stockKey] = (itemStock[def.stockKey]||0) + qty;
    });
  });

  // Convert to stock units
  const used = {};
  if (cupsLg > 0) used["Cup - Lg"] = cupsLg;
  if (cupsSm > 0) used["Cup - Sm"] = cupsSm;
  // Cow milk: 2L jugs → round up
  if (cowMilkMl > 0) used["Milk - Cow 2L"] = parseFloat((cowMilkMl/2000).toFixed(2));
  if (oatMilkMl > 0) used["Milk - Oat 1L"] = parseFloat((oatMilkMl/1000).toFixed(2));
  // Beans: 1kg bags → round up
  if (beansG > 0) used["Beans - 1kg"] = parseFloat((beansG/1000).toFixed(3));
  // Cans/bottles
  Object.entries(itemStock).forEach(([k,v]) => { used[k] = v; });

  return used;
}

// Cash / eftpos from paid orders
function deriveCashEftpos(orders) {
  let cash = 0, eftpos = 0;
  orders.filter(o => o.status==="paid").forEach(o => {
    if (o.payMethod === "cash")   cash   += o.total;
    if (o.payMethod === "eftpos") eftpos += o.total;
  });
  return { cash: cash.toFixed(2), eftpos: eftpos.toFixed(2) };
}

function buildSummary(ev) {
  const salesQty   = ev.salesOverride   || deriveSalesFromOrders(ev.orders);
  const stockUsed  = ev.stockOverride   || deriveStockFromOrders(ev.orders);
  const { cash, eftpos } = deriveCashEftpos(ev.orders);
  const cashVal   = hasData(ev.cashSales)   ? ev.cashSales   : cash;
  const eftposVal = hasData(ev.eftposSales) ? ev.eftposSales : eftpos;
  const total     = (parseFloat(cashVal||0) + parseFloat(eftposVal||0)).toFixed(2);

  let s = `Date: ${ev.date||"-"}
Event: ${ev.eventName||"-"}
Location: ${ev.location||"-"}
Completed By: ${ev.completedBy||"-"}
`;
  if (ev.staffRows.length) {
    s += `\n--- Staff ---\n`;
    ev.staffRows.forEach(r => { s += `${r.staffName}, Start: ${r.startTime||"-"}, End: ${r.endTime||"-"}\n`; });
  }
  const hasSales = Object.values(salesQty).some(v=>v>0);
  if (hasSales || hasData(cashVal)) {
    s += `\n--- Sales ---\n`;
    Object.entries(salesQty).filter(([,v])=>v>0).forEach(([k,v])=>{ s += `${k}: ${v}\n`; });
    s += `Cash Sales: $${cashVal}\nEftpos Sales: $${eftposVal}\nTotal Sales: $${total}\n`;
  }
  const hasStock = Object.keys(stockUsed).length > 0;
  if (hasStock) {
    s += `\n--- Stock Used ---\n`;
    Object.entries(stockUsed).forEach(([k,v])=>{ s += `${k}: ${v}\n`; });
  }
  if (ev.fridgeReadings.length) {
    s += `\n--- Fridge Temperatures ---\n`;
    ev.fridgeReadings.forEach(r=>{ s += `${r.time}: ${r.temp}°C\n`; });
  }
  if (hasData(ev.legaseaSignups)) s += `\nLegaSea Signups: ${ev.legaseaSignups}\n`;
  if (hasData(ev.crowdNotes)||hasData(ev.equipmentIssues)||hasData(ev.notes)) {
    s += `\n--- Notes ---\n`;
    if (hasData(ev.crowdNotes))       s += `Crowd & Busy Periods: ${ev.crowdNotes}\n`;
    if (hasData(ev.equipmentIssues))  s += `Equipment / Water / Power Issues: ${ev.equipmentIssues}\n`;
    if (hasData(ev.notes))            s += `General Notes: ${ev.notes}\n`;
  }
  return s;
}

// ─────────────────────────────────────────────
// SMALL UI ATOMS
// ─────────────────────────────────────────────

      {onSettings && (
        <button type="button" onClick={onSettings}

              d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>

// ─────────────────────────────────────────────
// POS SCREEN
// ─────────────────────────────────────────────
function POSScreen({event, onUpdateEvent, onBack}) {
  // Active order being built
  const [activeOrderId, setActiveOrderId] = useState(null);
  const [orderName, setOrderName] = useState("");
  const [currentItems, setCurrentItems] = useState([]); // [{menuId, qty, altMilk, customPrice}]
  const [activeCat, setActiveCat] = useState("coffee");
  const [showSavedOrders, setShowSavedOrders] = useState(false);
  const [payModal, setPayModal] = useState(false); // show payment screen
  const [toast, setToast] = useState(null);

  const showToast = (msg, color="bg-kaiGreen") => {
    setToast({msg,color});
    setTimeout(()=>setToast(null),2000);
  };

  const orders = event.orders || [];
  const openOrders = orders.filter(o=>o.status==="open"||o.status==="saved");
  const paidOrders = orders.filter(o=>o.status==="paid");

  const updateOrders = (newOrders) => {
    const updated = {...event, orders: newOrders};
    onUpdateEvent(updated);
  };

  // Calc current order total
  const orderTotal = useMemo(()=>{
    return currentItems.reduce((sum,item)=>{
      const def = MENU.find(m=>m.id===item.menuId);
      if (!def) return sum;
      const base = def.customPrice ? (parseFloat(item.customPrice)||0) : def.price;
      const alt  = item.altMilk ? 1 : 0;
      return sum + (base + alt) * item.qty;
    }, 0);
  }, [currentItems]);

  const startNewOrder = () => {
    setActiveOrderId(uid());
    setOrderName("");
    setCurrentItems([]);
  };

  const loadOrder = (order) => {
    setActiveOrderId(order.id);
    setOrderName(order.name||"");
    setCurrentItems(order.items||[]);
    setShowSavedOrders(false);
  };

  const saveCurrentOrder = () => {
    if (!currentItems.length) { showToast("Add items first","bg-kaiBurgundy"); return; }
    const newOrder = {
      id: activeOrderId || uid(),
      name: orderName,
      items: currentItems,
      total: orderTotal,
      status: "saved",
      savedAt: new Date().toISOString(),
    };
    const existing = orders.findIndex(o=>o.id===activeOrderId);
    let newOrders;
    if (existing>=0) {
      newOrders = orders.map(o=>o.id===activeOrderId ? newOrder : o);
    } else {
      newOrders = [...orders, newOrder];
    }
    updateOrders(newOrders);
    setActiveOrderId(newOrder.id);
    showToast("Order saved");
  };

  const markPaid = (method) => {
    if (!currentItems.length) { showToast("Add items first","bg-kaiBurgundy"); return; }
    const newOrder = {
      id: activeOrderId || uid(),
      name: orderName,
      items: currentItems,
      total: orderTotal,
      status: "paid",
      payMethod: method,
      paidAt: new Date().toISOString(),
    };
    const existing = orders.findIndex(o=>o.id===activeOrderId);
    let newOrders;
    if (existing>=0) {
      newOrders = orders.map(o=>o.id===activeOrderId ? newOrder : o);
    } else {
      newOrders = [...orders, newOrder];
    }
    updateOrders(newOrders);
    setActiveOrderId(null);
    setOrderName("");
    setCurrentItems([]);
    setPayModal(false);
    showToast(`✓ Paid by ${method}`);
  };

  const addItem = (menuItem) => {
    if (!activeOrderId) {
      const newId = uid();
      setActiveOrderId(newId);
      setOrderName("");
    }
    setCurrentItems(prev=>{
      const existing = prev.findIndex(i=>i.menuId===menuItem.id && !menuItem.customPrice);
      if (existing>=0 && !menuItem.customPrice) {
        return prev.map((i,idx)=>idx===existing ? {...i, qty:i.qty+1} : i);
      }
      return [...prev, {menuId:menuItem.id, qty:1, altMilk:false, customPrice:menuItem.customPrice ? "" : undefined}];
    });
  };

  const toggleAltMilk = (idx) => {
    setCurrentItems(prev=>prev.map((i,j)=>j===idx ? {...i, altMilk:!i.altMilk} : i));
  };

  const updateQty = (idx, delta) => {
    setCurrentItems(prev=>{
      const updated = prev.map((i,j)=>j===idx ? {...i, qty:Math.max(0, i.qty+delta)} : i);
      return updated.filter(i=>i.qty>0);
    });
  };

  const catItems = MENU.filter(m=>m.cat===activeCat);

  const itemLabel = (item) => {
    const def = MENU.find(m=>m.id===item.menuId);
    if (!def) return item.menuId;
    const base = def.customPrice ? (parseFloat(item.customPrice)||0) : def.price;
    const alt = item.altMilk ? 1 : 0;
    const price = base + alt;
    return `${def.label}${def.size?" "+def.size:""}${item.altMilk?" (Oat)":""} — ${fmt(price * item.qty)}`;
  };

  return (
    <div className="max-w-xl mx-auto flex flex-col h-screen overflow-hidden">
      {toast && <Toast msg={toast.msg} color={toast.color}/>}

      {/* POS Header */}
      <div className="bg-coffeeBrown text-white px-4 py-3 flex items-center gap-3 shrink-0">
        <button onClick={onBack} className="text-white/70 hover:text-white">
          <svg className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7"/>
          </svg>
        </button>
        <div className="flex-1">
          <div className="font-serif font-bold text-lg">☕ POS</div>
          <div className="text-xs text-white/60">{event.eventName||"Event"}</div>
        </div>
        {/* Saved orders button */}
        <div className="relative">
          <button onClick={()=>setShowSavedOrders(v=>!v)}
            className="bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded-lg text-sm font-semibold transition-colors flex items-center gap-1">
            <span>Orders</span>
            {openOrders.length > 0 && <span className="bg-amber-400 text-amber-900 text-xs rounded-full px-1.5 py-0.5 font-bold ml-1">{openOrders.length}</span>}
          </button>
          {showSavedOrders && (
            <div className="absolute right-0 top-10 bg-white text-gray-800 rounded-xl shadow-xl w-72 z-50 overflow-hidden border border-gray-100">
              <div className="px-3 py-2 bg-gray-50 border-b flex items-center justify-between">
                <span className="font-semibold text-sm">Open Orders</span>
                <button onClick={()=>setShowSavedOrders(false)} className="text-gray-400 hover:text-gray-600 text-xs">✕</button>
              </div>
              {openOrders.length === 0 ? (
                <p className="px-4 py-3 text-sm text-gray-400">No open orders</p>
              ) : openOrders.map(o=>(
                <button key={o.id} onClick={()=>loadOrder(o)}
                  className="w-full px-4 py-3 text-left hover:bg-gray-50 border-b border-gray-50 flex items-center justify-between transition-colors">
                  <div>
                    <div className="text-sm font-medium">{o.name||<span className="text-gray-400 italic">Unnamed</span>}</div>
                    <div className="text-xs text-gray-400">{o.items.length} item{o.items.length!==1?"s":""}</div>
                  </div>
                  <div className="text-sm font-bold text-kaiGreen">{fmt(o.total)}</div>
                </button>
              ))}
              <div className="px-3 py-2 bg-gray-50 border-t">
                <button onClick={()=>{startNewOrder(); setShowSavedOrders(false);}}
                  className="w-full bg-kaiBurgundy text-white py-1.5 rounded-lg text-sm font-semibold">
                  + New Order
                </button>
              </div>
            </div>
          )}
        </div>
      </div>

      <div className="flex flex-col flex-1 overflow-hidden">
        {/* Menu Categories */}
        <div className="flex bg-white border-b border-gray-100 shrink-0">
          {CAT_ORDER.map(cat=>(
            <button key={cat} onClick={()=>setActiveCat(cat)}
              className={`flex-1 py-2.5 text-xs font-semibold transition-colors ${activeCat===cat ? "text-kaiBurgundy border-b-2 border-kaiBurgundy" : "text-gray-400"}`}>
              {CAT_LABELS[cat]}
            </button>
          ))}
        </div>

        <div className="flex flex-1 overflow-hidden">
          {/* Menu Grid */}
          <div className="flex-1 overflow-y-auto p-3 bg-gray-50">
            {!activeOrderId && (
              <div className="mb-3 bg-amber-50 border border-amber-200 rounded-lg px-3 py-2 text-xs text-amber-700">
                Tap any item to start a new order
              </div>
            )}
            <div className="grid grid-cols-2 gap-2">
              {catItems.map(item=>(
                <button key={item.id} onClick={()=>addItem(item)}
                  className="bg-white hover:bg-kaiYellow border border-gray-100 rounded-xl p-3 text-left shadow-sm active:scale-95 transition-all">
                  <div className="font-semibold text-sm text-gray-800">{item.label}</div>
                  {item.size && <div className="text-xs text-gray-400 mt-0.5">{item.size}</div>}
                  <div className="text-sm font-bold text-kaiGreen mt-1">
                    {item.customPrice ? "Custom" : fmt(item.price)}
                    {item.altMilk && <span className="text-xs text-gray-400 font-normal ml-1">+$1 oat</span>}
                  </div>
                </button>
              ))}
            </div>
          </div>

          {/* Order Panel */}
          <div className="w-48 flex flex-col bg-white border-l border-gray-100 shrink-0">
            {/* Order name */}
            <div className="px-2 pt-2 pb-1 border-b border-gray-50">
              <input
                className="w-full border border-gray-200 rounded-lg px-2 py-1 text-xs font-sans focus:outline-none focus:ring-1 focus:ring-kaiGreen/40"
                placeholder="Customer name (optional)"
                value={orderName}
                onChange={e=>setOrderName(e.target.value)}
              />
            </div>

            {/* Items list */}
            <div className="flex-1 overflow-y-auto p-1 space-y-1">
              {currentItems.length === 0 ? (
                <p className="text-xs text-gray-300 text-center pt-4 px-2">Tap items to add</p>
              ) : currentItems.map((item,idx)=>{
                const def = MENU.find(m=>m.id===item.menuId);
                const basePrice = def?.customPrice ? (parseFloat(item.customPrice)||0) : (def?.price||0);
                const lineTotal = (basePrice + (item.altMilk?1:0)) * item.qty;
                return (
                  <div key={idx} className="bg-gray-50 rounded-lg p-1.5 text-xs">
                    <div className="flex items-start justify-between gap-1">
                      <div className="flex-1 min-w-0">
                        <div className="font-medium text-gray-800 truncate">
                          {def?.label}{def?.size?" "+def.size:""}
                        </div>
                        {def?.customPrice && (
                          <input
                            className="w-full border border-gray-200 rounded px-1 py-0.5 text-xs mt-0.5"
                            placeholder="$ price"
                            value={item.customPrice||""}
                            onChange={e=>setCurrentItems(prev=>prev.map((x,j)=>j===idx?{...x,customPrice:e.target.value}:x))}
                          />
                        )}
                        {def?.altMilk && (
                          <button onClick={()=>toggleAltMilk(idx)}
                            className={`mt-0.5 px-1.5 py-0.5 rounded text-[10px] font-semibold transition-colors ${item.altMilk ? "bg-kaiGreen text-white" : "bg-gray-200 text-gray-500"}`}>
                            Oat {item.altMilk ? "✓" : "+$1"}
                          </button>
                        )}
                      </div>
                      <div className="text-right shrink-0">
                        <div className="font-bold text-kaiGreen">{fmt(lineTotal)}</div>
                        <div className="flex items-center gap-1 mt-0.5">
                          <button onClick={()=>updateQty(idx,-1)} className="w-5 h-5 bg-gray-200 hover:bg-gray-300 rounded text-gray-600 flex items-center justify-center font-bold">−</button>
                          <span className="w-4 text-center font-bold">{item.qty}</span>
                          <button onClick={()=>updateQty(idx,1)} className="w-5 h-5 bg-gray-200 hover:bg-gray-300 rounded text-gray-600 flex items-center justify-center font-bold">+</button>
                        </div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Order total + actions */}
            <div className="border-t border-gray-100 p-2 space-y-1.5 shrink-0">
              <div className="flex justify-between items-center px-1">
                <span className="text-xs text-gray-500">Total</span>
                <span className="text-lg font-serif font-bold text-kaiBurgundy">{fmt(orderTotal)}</span>
              </div>
              <button onClick={saveCurrentOrder}
                className="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 py-1.5 rounded-lg text-xs font-semibold transition-colors">
                Save Order
              </button>
              <button onClick={()=>currentItems.length?setPayModal(true):showToast("Add items first","bg-kaiBurgundy")}
                className="w-full bg-kaiGreen hover:bg-green-700 text-white py-2 rounded-lg text-sm font-bold transition-colors">
                Pay →
              </button>
            </div>
          </div>
        </div>

        {/* Paid orders summary bar */}
        {paidOrders.length > 0 && (
          <div className="shrink-0 bg-kaiGreen/10 border-t border-kaiGreen/20 px-4 py-2 flex items-center justify-between text-sm">
            <span className="text-kaiGreen font-semibold">{paidOrders.length} paid order{paidOrders.length!==1?"s":""}</span>
            <span className="font-bold text-kaiGreen">{fmt(paidOrders.reduce((s,o)=>s+o.total,0))}</span>
          </div>
        )}
      </div>

      {/* Payment modal */}
      {payModal && (
        <div className="fixed inset-0 bg-black/60 flex items-end justify-center z-50 p-4">
          <div className="bg-white w-full max-w-sm rounded-2xl shadow-2xl p-6 space-y-4">
            <h2 className="text-2xl font-serif font-bold text-center text-kaiBurgundy">
              {fmt(orderTotal)}
            </h2>
            <p className="text-center text-sm text-gray-500">Select payment method</p>
            <div className="grid grid-cols-2 gap-3">
              <button onClick={()=>markPaid("cash")}
                className="bg-kaiGreen hover:bg-green-700 text-white py-4 rounded-xl text-lg font-bold transition-colors">
                💵 Cash
              </button>
              <button onClick={()=>markPaid("eftpos")}
                className="bg-kaiBlue hover:bg-blue-900 text-white py-4 rounded-xl text-lg font-bold transition-colors">
                💳 Eftpos
              </button>
            </div>
            <button onClick={()=>setPayModal(false)}
              className="w-full text-gray-400 hover:text-gray-600 py-2 text-sm transition-colors">
              Cancel
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ORDER HISTORY (inside event screen)

function OrderHistory({orders}) {
  const [expanded, setExpanded] = useState(null);
  if (!orders || orders.length === 0) return null;
  return (
    <div className="space-y-2">
      {[...orders].reverse().map(order=>{
        const isOpen = expanded === order.id;
        const statusColor = order.status==="paid" ? "bg-kaiGreen text-white" : "bg-amber-100 text-amber-800";
        return (
          <div key={order.id} className="border border-gray-100 rounded-xl overflow-hidden">
            <button onClick={()=>setExpanded(isOpen?null:order.id)}
              className="w-full px-4 py-3 flex items-center gap-3 text-left hover:bg-gray-50 transition-colors">
              <div className="flex-1">
                <div className="text-sm font-semibold text-gray-800">
                  {order.name || <span className="text-gray-400 italic font-normal">Unnamed</span>}
                </div>
                <div className="text-xs text-gray-400">{order.items?.length} item{order.items?.length!==1?"s":""}</div>
              </div>
              <span className={`text-xs px-2 py-0.5 rounded-full font-semibold ${statusColor}`}>{order.status}</span>
              <div className="text-sm font-bold text-kaiBurgundy">{fmt(order.total)}</div>
              <svg className={`h-4 w-4 text-gray-300 transition-transform ${isOpen?"rotate-180":""}`} fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7"/>
              </svg>
            </button>
            {isOpen && (
              <div className="px-4 pb-3 bg-gray-50 border-t border-gray-100">
                {order.items?.map((item,i)=>{
                  const def = MENU.find(m=>m.id===item.menuId);
                  const base = def?.customPrice ? (parseFloat(item.customPrice)||0) : (def?.price||0);
                  return (
                    <div key={i} className="flex justify-between text-xs py-1 border-b border-gray-100 last:border-0">
                      <span className="text-gray-700">{def?.label}{def?.size?" "+def.size:""}{item.altMilk?" (Oat)":""} ×{item.qty}</span>
                      <span className="font-medium">{fmt((base+(item.altMilk?1:0))*item.qty)}</span>
                    </div>
                  );
                })}
                {order.payMethod && (
                  <div className="mt-2 text-xs text-gray-500">Paid by {order.payMethod}</div>
                )}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ─────────────────────────────────────────────
// EVENT / SALES REPORT SCREEN
// ─────────────────────────────────────────────
function EventScreen({webAppUrl, onBack}) {
  const [event, setEvent]     = useState(()=>loadEvent()||blankEvent());
  const [screen, setScreen]   = useState("event"); // event | pos
  const [showSummary, setShowSummary] = useState(false);
  const [loading, setLoading] = useState(false);
  const [toast, setToast]     = useState(null);
  const [copied, setCopied]   = useState(false);
  const [showStockEdit, setShowStockEdit] = useState(false);
  const [showSalesEdit, setShowSalesEdit] = useState(false);

  const showToast = (msg,color="bg-kaiGreen")=>{
    setToast({msg,color});
    setTimeout(()=>setToast(null), 3000);
  };

  // Auto-save whenever event changes
  useEffect(()=>{ saveEvent(event); }, [event]);

  const upd = (key, val) => setEvent(prev=>({...prev, [key]:val}));

  const addStaff = () => upd("staffRows", [...(event.staffRows||[]), {staffName:STAFF[0], startTime:"", endTime:""}]);
  const removeStaff = i => upd("staffRows", event.staffRows.filter((_,j)=>j!==i));

  const addFridge = () => upd("fridgeReadings", [...(event.fridgeReadings||[]), {time:nowTime(), temp:""}]);
  const removeFridge = i => upd("fridgeReadings", event.fridgeReadings.filter((_,j)=>j!==i));

  // Derived values
  const derivedSales  = useMemo(()=>deriveSalesFromOrders(event.orders||[]), [event.orders]);
  const derivedStock  = useMemo(()=>deriveStockFromOrders(event.orders||[]),  [event.orders]);
  const { cash, eftpos } = useMemo(()=>deriveCashEftpos(event.orders||[]),    [event.orders]);

  const activeSales = event.salesOverride || derivedSales;
  const activeStock = event.stockOverride || derivedStock;
  const cashVal     = hasData(event.cashSales)   ? event.cashSales   : cash;
  const eftposVal   = hasData(event.eftposSales) ? event.eftposSales : eftpos;
  const totalSales  = (parseFloat(cashVal||0)+parseFloat(eftposVal||0)).toFixed(2);

  const paidOrders = (event.orders||[]).filter(o=>o.status==="paid");
  const totalOrders = paidOrders.length;
  const totalRevenue = paidOrders.reduce((s,o)=>s+o.total,0);

  const submit = async () => {
    if (!event.date||!event.completedBy||!event.eventName) {
      showToast("Date, Event Name and Completed By required","bg-kaiBurgundy");
      return;
    }
    if (!webAppUrl) { showToast("No Web App URL configured","bg-kaiBurgundy"); return; }
    setLoading(true);
    try {
      const fd = new FormData();
      fd.append("action","salesReport");
      fd.append("date", event.date);
      fd.append("eventName", event.eventName);
      fd.append("location", event.location||"");
      fd.append("completedBy", event.completedBy);
      fd.append("timestamp", new Date().toISOString());
      (event.staffRows||[]).forEach(r=>{
        fd.append("staffName[]", r.staffName);
        fd.append("staffStart[]", r.startTime);
        fd.append("staffEnd[]", r.endTime);
      });
      Object.entries(activeSales).filter(([,v])=>v>0).forEach(([k,v])=>{
        fd.append("saleProduct[]",k); fd.append("saleQty[]",v);
      });
      fd.append("cashSales",  cashVal||"0");
      fd.append("eftposSales",eftposVal||"0");
      fd.append("totalSales", totalSales);
      Object.entries(activeStock).forEach(([k,v])=>{
        fd.append("stockItem[]",k); fd.append("stockQty[]",v);
      });
      (event.fridgeReadings||[]).forEach(r=>{
        fd.append("fridgeTime[]",r.time); fd.append("fridgeTemp[]",r.temp);
      });
      fd.append("crowdNotes",       event.crowdNotes||"");
      fd.append("equipmentIssues",  event.equipmentIssues||"");
      fd.append("legaseaSignups",   event.legaseaSignups||"");
      fd.append("notes",            event.notes||"");

      const res  = await fetch(webAppUrl, {method:"POST", body:fd});
      const json = await res.json();
      if (!json.success) throw new Error(json.error);
      showToast("✓ Report submitted successfully");
      setShowSummary(false);
      clearEvent();
      setEvent(blankEvent());
    } catch(err) {
      showToast("Error: "+err.message,"bg-kaiBurgundy");
    } finally {
      setLoading(false);
    }
  };

  if (screen === "pos") {
    return <POSScreen event={event} onUpdateEvent={e=>{ setEvent(e); }} onBack={()=>setScreen("event")}/>;
  }

  return (
    <div className="max-w-xl mx-auto p-4 pb-8 md:p-8">
      {toast && <Toast msg={toast.msg} color={toast.color}/>}
      {copied && <Toast msg="✓ Copied to clipboard" color="bg-kaiBlue"/>}

      <Header subtitle={event.eventName||"Sales Report"} onBack={onBack}/>

      <div className="space-y-4">
        {/* Event Details */}
        <Card title="Event Details">
          <div className="grid grid-cols-2 gap-3">
            <Field label="Date *">
              <input type="date" className={inp} value={event.date} onChange={e=>upd("date",e.target.value)}/>
            </Field>
            <Field label="Completed By *">
              <input type="text" placeholder="Your name" className={inp} value={event.completedBy} onChange={e=>upd("completedBy",e.target.value)}/>
            </Field>
            <Field label="Event Name *">
              <input type="text" placeholder="e.g. Westhaven Boat Show" className={inp} value={event.eventName} onChange={e=>upd("eventName",e.target.value)}/>
            </Field>
            <Field label="Location">
              <input type="text" placeholder="e.g. Westhaven Marina" className={inp} value={event.location} onChange={e=>upd("location",e.target.value)}/>
            </Field>
          </div>
        </Card>

        {/* POS Entry */}
        <div className="bg-coffeeBrown text-white rounded-xl shadow p-5 flex items-center gap-4">
          <div className="text-3xl">☕</div>
          <div className="flex-1">
            <div className="font-serif font-bold text-lg">Point of Sale</div>
            <div className="text-xs text-white/70 mt-0.5">
              {totalOrders} order{totalOrders!==1?"s":""} · {fmt(totalRevenue)} taken
            </div>
          </div>
          <button onClick={()=>setScreen("pos")}
            className="bg-white text-coffeeBrown hover:bg-kaiYellow px-4 py-2 rounded-xl font-bold text-sm transition-colors shadow">
            Enter POS →
          </button>
        </div>

        {/* Order History */}
        {(event.orders||[]).length > 0 && (
          <Card title={`Order History (${(event.orders||[]).length})`} color="text-coffeeBrown" bg="bg-amber-50">
            <OrderHistory orders={event.orders||[]}/>
          </Card>
        )}

        {/* Sales Summary */}
        <Card
          title="Sales Summary"
          action={
            <button onClick={()=>setShowSalesEdit(v=>!v)}
              className="text-xs text-kaiGreen font-semibold hover:underline">
              {showSalesEdit?"Done":"Edit"}
            </button>
          }
        >
          {showSalesEdit ? (
            <div className="space-y-3">
              <p className="text-xs text-gray-400">Editing overrides auto-calculated values from POS</p>
              <div className="grid grid-cols-2 gap-x-3 gap-y-2">
                {ALL_REPORT_PRODUCTS.map(prod=>(
                  <div key={prod} className="flex items-center gap-2">
                    <span className="text-xs text-gray-700 flex-1 min-w-0 truncate">{prod}</span>
                    <input type="number" placeholder="0"
                      className="w-16 border rounded-lg px-2 py-1 text-xs text-right"
                      value={event.salesOverride?.[prod] ?? activeSales[prod] ?? ""}
                      onChange={e=>{
                        const override = {...(event.salesOverride||activeSales)};
                        override[prod] = e.target.value === "" ? 0 : parseInt(e.target.value)||0;
                        upd("salesOverride", override);
                      }}
                    />
                  </div>
                ))}
              </div>
              <button onClick={()=>{ upd("salesOverride",null); }}
                className="text-xs text-gray-400 hover:text-red-500 underline">Reset to POS values</button>
            </div>
          ) : (
            <div>
              {Object.entries(activeSales).filter(([,v])=>v>0).length===0 ? (
                <p className="text-sm text-gray-400 text-center py-2">No sales yet — enter via POS</p>
              ) : (
                <div className="grid grid-cols-2 gap-x-3 gap-y-1">
                  {Object.entries(activeSales).filter(([,v])=>v>0).map(([k,v])=>(
                    <div key={k} className="flex justify-between text-sm py-0.5">
                      <span className="text-gray-700">{k}</span>
                      <span className="font-semibold">{v}</span>
                    </div>
                  ))}
                </div>
              )}
              <div className="mt-3 pt-3 border-t border-gray-100 grid grid-cols-3 gap-3">
                <Field label="Cash ($)">
                  <input type="number" step="0.01" placeholder="0.00" className={inp}
                    value={event.cashSales} onChange={e=>upd("cashSales",e.target.value)}/>
                </Field>
                <Field label="Eftpos ($)">
                  <input type="number" step="0.01" placeholder="0.00" className={inp}
                    value={event.eftposSales} onChange={e=>upd("eftposSales",e.target.value)}/>
                </Field>
                <Field label="Total">
                  <div className={`${inp} bg-gray-50 font-semibold text-kaiGreen`}>${totalSales}</div>
                </Field>
              </div>
              {(hasData(event.cashSales)||hasData(event.eftposSales)) && (
                <p className="text-xs text-gray-400 mt-1">Cash/Eftpos manually entered (overrides POS)</p>
              )}
            </div>
          )}
        </Card>

        {/* Stock Used */}
        <Card
          title="Stock Used"
          action={
            <button onClick={()=>setShowStockEdit(v=>!v)}
              className="text-xs text-kaiGreen font-semibold hover:underline">
              {showStockEdit?"Done":"Edit"}
            </button>
          }
        >
          {showStockEdit ? (
            <div className="space-y-2">
              <p className="text-xs text-gray-400">Editing overrides auto-calculated values</p>
              <div className="grid grid-cols-2 gap-x-3 gap-y-2">
                {STOCK_ITEMS.map(item=>(
                  <div key={item} className="flex items-center gap-2">
                    <span className="text-xs text-gray-700 flex-1 min-w-0 truncate">{item}</span>
                    <input type="number" placeholder="0" step="0.001"
                      className="w-16 border rounded-lg px-2 py-1 text-xs text-right"
                      value={event.stockOverride?.[item] ?? activeStock[item] ?? ""}
                      onChange={e=>{
                        const override = {...(event.stockOverride||activeStock)};
                        override[item] = e.target.value===""?0:parseFloat(e.target.value)||0;
                        upd("stockOverride", override);
                      }}
                    />
                  </div>
                ))}
              </div>
              <button onClick={()=>upd("stockOverride",null)}
                className="text-xs text-gray-400 hover:text-red-500 underline">Reset to auto values</button>
            </div>
          ) : (
            <div>
              {Object.keys(activeStock).length===0 ? (
                <p className="text-sm text-gray-400 text-center py-2">Auto-calculated from POS sales</p>
              ) : (
                <div className="grid grid-cols-2 gap-x-3 gap-y-1">
                  {STOCK_ITEMS.filter(k=>activeStock[k]>0).map(k=>(
                    <div key={k} className="flex justify-between text-sm py-0.5">
                      <span className="text-gray-700">{k}</span>
                      <span className="font-semibold">{activeStock[k]}</span>
                    </div>
                  ))}
                </div>
              )}
              {event.stockOverride && (
                <p className="text-xs text-gray-400 mt-2">Manually overridden</p>
              )}
            </div>
          )}
        </Card>

        {/* Staff */}
        <Card title="Staff" action={<AddBtn onClick={addStaff} label="+ Add"/>}>
          {(event.staffRows||[]).length===0 && <p className="text-sm text-gray-400 text-center py-1">No staff added</p>}
          {(event.staffRows||[]).map((r,i)=>(
            <div key={i} className="bg-kaiGreen/5 p-3 rounded-xl relative mb-2">
              <RemoveBtn onClick={()=>removeStaff(i)}/>
              <div className="grid grid-cols-3 gap-2">
                <select className={inp} value={r.staffName}
                  onChange={e=>upd("staffRows", event.staffRows.map((x,j)=>j===i?{...x,staffName:e.target.value}:x))}>
                  {STAFF.map(s=><option key={s}>{s}</option>)}
                </select>
                <div>
                  <span className="text-[10px] text-gray-400 block mb-1">Start</span>
                  <input type="time" className={inp} value={r.startTime}
                    onChange={e=>upd("staffRows", event.staffRows.map((x,j)=>j===i?{...x,startTime:e.target.value}:x))}/>
                </div>
                <div>
                  <span className="text-[10px] text-gray-400 block mb-1">End</span>
                  <input type="time" className={inp} value={r.endTime}
                    onChange={e=>upd("staffRows", event.staffRows.map((x,j)=>j===i?{...x,endTime:e.target.value}:x))}/>
                </div>
              </div>
            </div>
          ))}
        </Card>

        {/* Fridge Temp */}
        <Card title="Fridge Temperature" action={<AddBtn onClick={addFridge} label="+ Reading"/>}>
          {(event.fridgeReadings||[]).length===0 && <p className="text-sm text-gray-400 text-center py-1">No readings yet</p>}
          {(event.fridgeReadings||[]).map((r,i)=>(
            <div key={i} className="bg-blue-50 p-3 rounded-xl relative mb-2">
              <RemoveBtn onClick={()=>removeFridge(i)}/>
              <div className="grid grid-cols-2 gap-3">
                <div>
                  <span className="text-[10px] text-gray-400 block mb-1">Time</span>
                  <input type="time" className={inp} value={r.time}
                    onChange={e=>upd("fridgeReadings", event.fridgeReadings.map((x,j)=>j===i?{...x,time:e.target.value}:x))}/>
                </div>
                <div>
                  <span className="text-[10px] text-gray-400 block mb-1">Temp (°C)</span>
                  <input type="number" step="0.1" placeholder="e.g. 4.0" className={inp} value={r.temp}
                    onChange={e=>upd("fridgeReadings", event.fridgeReadings.map((x,j)=>j===i?{...x,temp:e.target.value}:x))}/>
                </div>
              </div>
            </div>
          ))}
        </Card>

        {/* Operational Notes */}
        <Card title="Notes">
          <div className="space-y-3">
            <Field label="Crowd Size & Busy Periods">
              <textarea className={`${inp} h-20`} placeholder="e.g. ~500 people, busy 10–11am"
                value={event.crowdNotes} onChange={e=>upd("crowdNotes",e.target.value)}/>
            </Field>
            <Field label="Equipment / Water / Power Issues">
              <textarea className={`${inp} h-16`} placeholder="e.g. No issues"
                value={event.equipmentIssues} onChange={e=>upd("equipmentIssues",e.target.value)}/>
            </Field>
            <Field label="LegaSea Signups (count)">
              <input type="number" placeholder="0" className={inp}
                value={event.legaseaSignups} onChange={e=>upd("legaseaSignups",e.target.value)}/>
            </Field>
            <Field label="General Notes">
              <textarea className={`${inp} h-20`} placeholder="Any other observations..."
                value={event.notes} onChange={e=>upd("notes",e.target.value)}/>
            </Field>
          </div>
        </Card>

        {/* Review button */}
        <button onClick={()=>setShowSummary(true)}
          className="w-full bg-kaiGreen hover:bg-green-700 text-white py-4 rounded-xl text-lg font-serif font-bold shadow transition-colors">
          Review & Submit
        </button>

        {/* Clear data button */}
        <button onClick={()=>{ if(window.confirm("Clear all event data and start fresh?")){ clearEvent(); setEvent(blankEvent()); }}}
          className="w-full text-gray-400 hover:text-red-400 py-2 text-sm transition-colors">
          Clear & start new event
        </button>
      </div>

      {/* Summary modal */}
      {showSummary && (
        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
          <div className="bg-kaiYellow w-full max-w-xl rounded-2xl shadow-2xl overflow-y-auto max-h-[90vh] p-6 relative">
            <button onClick={()=>setShowSummary(false)}
              className="absolute top-4 right-4 text-kaiBurgundy text-xl font-bold">✕</button>
            <h2 className="text-2xl font-serif font-bold mb-4 text-kaiBurgundy">Report Summary</h2>
            <pre className="whitespace-pre-wrap font-sans text-gray-800 text-sm bg-white p-4 rounded-xl">
              {buildSummary(event)}
            </pre>
            <button
              onClick={()=>{ navigator.clipboard.writeText(buildSummary(event)); setCopied(true); setTimeout(()=>setCopied(false),2000); }}
              className="mt-4 w-full bg-kaiBlue hover:bg-blue-900 text-white py-2.5 rounded-xl font-semibold transition-colors">
              Copy Summary
            </button>
            <button onClick={submit} disabled={loading}
              className="mt-3 w-full bg-kaiBurgundy hover:bg-red-800 disabled:bg-gray-300 text-white py-3.5 rounded-xl text-lg font-serif font-bold shadow transition-colors">
              {loading?"Saving…":"Submit Report"}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────
// STOCK SCREEN
// ─────────────────────────────────────────────
function StockScreen({webAppUrl, onBack}) {
  const [tab, setTab] = useState("levels");
  const [stockLevels, setStockLevels] = useState(null);
  const [reorderLog, setReorderLog]   = useState([]);
  const [loading, setLoading]         = useState(false);
  const [toast, setToast]             = useState(null);
  const [editLevels, setEditLevels]   = useState({});
  const [submitting, setSubmitting]   = useState(false);

  // Reorder form state
  const [reorderDate, setReorderDate] = useState(todayStr());
  const [supplier, setSupplier]       = useState("");
  const [reorderItems, setReorderItems] = useState(
    STOCK_ITEMS.map(item=>({item, qty:"", costPerUnit:""}))
  );

  const showToast=(msg,color="bg-kaiGreen")=>{setToast({msg,color});setTimeout(()=>setToast(null),2500);};

  const fetchStock = useCallback(async()=>{
    if (!webAppUrl) return;
    setLoading(true);
    try {
      const res  = await fetch(`${webAppUrl}?action=getStock`);
      const data = await res.json();
      if (data.success) { setStockLevels(data.stock); setReorderLog(data.reorderLog||[]); }
      else showToast("Error: "+data.error,"bg-kaiBurgundy");
    } catch(e){ showToast("Connection failed","bg-kaiBurgundy"); }
    finally { setLoading(false); }
  }, [webAppUrl]);

  useEffect(()=>{ fetchStock(); },[fetchStock]);

  const submitReorder = async()=>{
    const items = reorderItems.filter(r=>hasData(r.qty));
    if (!items.length){ showToast("Enter at least one quantity","bg-kaiBurgundy"); return; }
    if (!supplier.trim()){ showToast("Enter a supplier / source","bg-kaiBurgundy"); return; }
    setSubmitting(true);
    try {
      const fd = new FormData();
      fd.append("action","reorder");
      fd.append("date", reorderDate);
      fd.append("supplier", supplier);
      items.forEach(r=>{
        fd.append("item[]", r.item);
        fd.append("qty[]", r.qty);
        fd.append("costPerUnit[]", r.costPerUnit||"0");
      });
      const res  = await fetch(webAppUrl,{method:"POST",body:fd});
      const data = await res.json();
      if (data.success){
        showToast("✓ Reorder logged");
        setSupplier(""); setTab("levels");
        setReorderItems(STOCK_ITEMS.map(item=>({item,qty:"",costPerUnit:""})));
        fetchStock();
      } else showToast("Error: "+data.error,"bg-kaiBurgundy");
    } catch(e){ showToast("Failed: "+e.message,"bg-kaiBurgundy"); }
    finally { setSubmitting(false); }
  };

  const saveEdits = async()=>{
    if (!Object.keys(editLevels).length) return;
    setSubmitting(true);
    try {
      const fd = new FormData();
      fd.append("action","updateStock");
      Object.entries(editLevels).forEach(([item,qty])=>{ fd.append("item[]",item); fd.append("qty[]",qty); });
      const res  = await fetch(webAppUrl,{method:"POST",body:fd});
      const data = await res.json();
      if (data.success){ showToast("✓ Stock updated"); setEditLevels({}); fetchStock(); }
      else showToast("Error: "+data.error,"bg-kaiBurgundy");
    } catch(e){ showToast("Failed","bg-kaiBurgundy"); }
    finally { setSubmitting(false); }
  };

  return (
    <div className="max-w-xl mx-auto p-4 md:p-8">
      {toast && <Toast msg={toast.msg} color={toast.color}/>}
      <Header subtitle="Stock Management" onBack={onBack}/>

      {/* Tabs */}
      <div className="flex rounded-xl overflow-hidden shadow-sm border border-gray-100 mb-5">
        {[["levels","Stock Levels"],["reorder","Log Reorder"],["log","History"]].map(([id,label])=>(
          <button key={id} onClick={()=>setTab(id)}
            className={`flex-1 py-3 font-semibold text-sm transition-colors ${tab===id?"bg-kaiGreen text-white":"bg-white text-gray-500 hover:bg-gray-50"}`}>
            {label}
          </button>
        ))}
      </div>

      {tab==="levels" && (
        <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
          <div className="bg-kaiGreen/5 px-4 py-3 border-b flex justify-between items-center">
            <h3 className="font-serif text-kaiGreen text-base font-semibold">Current Stock</h3>
            <button onClick={fetchStock} className="text-kaiGreen text-xs hover:underline">↻ Refresh</button>
          </div>
          {loading ? <p className="p-6 text-center text-gray-400">Loading…</p> : (
            <>
              <div className="divide-y divide-gray-50">
                {STOCK_ITEMS.map(item=>{
                  const level = stockLevels?.[item];
                  const editVal = editLevels[item];
                  const display = editVal!==undefined ? editVal : (level??"-");
                  const low = typeof level==="number" && level<=2;
                  return (
                    <div key={item} className="flex items-center px-4 py-3 gap-3">
                      <span className="flex-1 text-sm text-gray-700">{item}</span>
                      {low && <span className="text-xs bg-red-100 text-red-600 px-2 py-0.5 rounded-full font-medium">Low</span>}
                      <input type="number" className="w-20 border border-gray-200 rounded-lg px-2 py-1 text-sm text-right font-sans"
                        value={display==="-"?"":display} placeholder={display==="-"?"-":undefined}
                        onChange={e=>setEditLevels(prev=>({...prev,[item]:e.target.value}))}/>
                    </div>
                  );
                })}
              </div>
              {Object.keys(editLevels).length>0 && (
                <div className="p-4 border-t">
                  <button onClick={saveEdits} disabled={submitting}
                    className="w-full bg-kaiGreen hover:bg-green-700 text-white py-2.5 rounded-xl font-semibold disabled:opacity-50 transition-colors">
                    {submitting?"Saving…":"Save Changes"}
                  </button>
                </div>
              )}
            </>
          )}
        </div>
      )}

      {tab==="reorder" && (
        <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
          <div className="bg-kaiBurgundy/5 px-4 py-3 border-b">
            <h3 className="font-serif text-kaiBurgundy text-base font-semibold">Log a Reorder</h3>
          </div>
          <div className="p-4 space-y-4">
            <div className="grid grid-cols-2 gap-3">
              <Field label="Date *">
                <input type="date" className={inp} value={reorderDate} onChange={e=>setReorderDate(e.target.value)}/>
              </Field>
              <Field label="Supplier / Source *">
                <input type="text" placeholder="e.g. Gilmours" className={inp}
                  value={supplier} onChange={e=>setSupplier(e.target.value)}/>
              </Field>
            </div>
            <div>
              <div className="grid grid-cols-3 gap-x-2 mb-1 px-1">
                <span className="col-span-1 text-xs text-gray-400 font-medium">Item</span>
                <span className="text-xs text-gray-400 font-medium text-right">Qty</span>
                <span className="text-xs text-gray-400 font-medium text-right">Cost / unit ($)</span>
              </div>
              <div className="border border-gray-100 rounded-xl overflow-hidden divide-y divide-gray-50">
                {reorderItems.map((r,i)=>(
                  <div key={r.item} className="grid grid-cols-3 gap-x-2 items-center px-3 py-2">
                    <span className="text-sm text-gray-700 truncate">{r.item}</span>
                    <input type="number" placeholder="0" className="border border-gray-200 rounded-lg px-2 py-1 text-sm text-right font-sans"
                      value={r.qty}
                      onChange={e=>{ const u=[...reorderItems]; u[i]={...r,qty:e.target.value}; setReorderItems(u); }}/>
                    <input type="number" step="0.01" placeholder="0.00" className="border border-gray-200 rounded-lg px-2 py-1 text-sm text-right font-sans"
                      value={r.costPerUnit}
                      onChange={e=>{ const u=[...reorderItems]; u[i]={...r,costPerUnit:e.target.value}; setReorderItems(u); }}/>
                  </div>
                ))}
              </div>
            </div>
            {/* Cost total preview */}
            {reorderItems.some(r=>hasData(r.qty)&&hasData(r.costPerUnit)) && (
              <div className="bg-gray-50 rounded-lg px-4 py-2 flex justify-between text-sm">
                <span className="text-gray-500">Total reorder cost</span>
                <span className="font-bold text-kaiBurgundy">
                  {fmt(reorderItems.reduce((s,r)=>{
                    const qty  = parseFloat(r.qty)||0;
                    const cost = parseFloat(r.costPerUnit)||0;
                    return s + qty*cost;
                  },0))}
                </span>
              </div>
            )}
            <button onClick={submitReorder} disabled={submitting}
              className="w-full bg-kaiBurgundy hover:bg-red-800 disabled:opacity-50 text-white py-3 rounded-xl font-semibold transition-colors">
              {submitting?"Saving…":"Submit Reorder"}
            </button>
          </div>
        </div>
      )}

      {tab==="log" && (
        <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
          <div className="bg-kaiBlue/5 px-4 py-3 border-b">
            <h3 className="font-serif text-kaiBlue text-base font-semibold">Reorder History</h3>
          </div>
          {reorderLog.length===0 ? (
            <p className="p-6 text-center text-sm text-gray-400">No reorders logged yet</p>
          ) : reorderLog.map((r,i)=>(
            <div key={i} className="p-4 border-b border-gray-50 last:border-0">
              <div className="flex justify-between items-center mb-2">
                <span className="font-semibold text-sm text-gray-800">{r.date}</span>
                <span className="text-xs bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full">{r.supplier}</span>
              </div>
              <div className="space-y-0.5">
                {r.items?.map((it,j)=>(
                  <div key={j} className="flex justify-between text-xs text-gray-600">
                    <span>{it.item}</span>
                    <span className="font-medium">
                      ×{it.qty}{it.costPerUnit>0?` @ ${fmt(it.costPerUnit)}`:""}
                      {it.qty&&it.costPerUnit>0 ? <span className="text-gray-400"> = {fmt(it.qty*it.costPerUnit)}</span> : ""}
                    </span>
                  </div>
                ))}
              </div>
              {r.totalCost>0 && (
                <div className="mt-2 pt-2 border-t border-gray-100 flex justify-between text-xs">
                  <span className="text-gray-500">Order total</span>
                  <span className="font-bold text-kaiBurgundy">{fmt(r.totalCost)}</span>
                </div>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────
// DASHBOARD SCREEN
// ─────────────────────────────────────────────
function DashboardScreen({webAppUrl, onBack}) {
  const [data,    setData]    = useState(null);
  const [loading, setLoading] = useState(true);
  const [toast,   setToast]   = useState(null);

  useEffect(()=>{
    if (!webAppUrl){ setLoading(false); return; }
    fetch(`${webAppUrl}?action=dashboard`)
      .then(r=>r.json())
      .then(d=>{ if(d.success)setData(d); else setToast({msg:"Error: "+d.error,color:"bg-kaiBurgundy"}); })
      .catch(()=>setToast({msg:"Failed to connect",color:"bg-kaiBurgundy"}))
      .finally(()=>setLoading(false));
  },[webAppUrl]);

  const stat=(label,value,color="text-kaiBurgundy")=>(
    <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-4 text-center">
      <div className={`text-2xl font-serif font-bold ${color}`}>{value??"-"}</div>
      <div className="text-xs text-gray-400 mt-1">{label}</div>
    </div>
  );

  return (
    <div className="max-w-xl mx-auto p-4 md:p-8">
      {toast && <Toast msg={toast.msg} color={toast.color}/>}
      <Header subtitle="Dashboard" onBack={onBack}/>
      {loading ? (
        <div className="text-center py-16 text-gray-400">Loading…</div>
      ) : !data ? (
        <div className="bg-white rounded-xl shadow p-8 text-center text-gray-400 text-sm">Submit your first report to see stats</div>
      ) : (
        <div className="space-y-5">
          <div className="grid grid-cols-2 gap-3">
            {stat("Total Events",    data.totalEvents,                        "text-kaiBurgundy")}
            {stat("Total Revenue",   data.totalRevenue?`$${data.totalRevenue}`:"-", "text-kaiGreen")}
            {stat("LegaSea Signups", data.totalSignups,                       "text-kaiBlue")}
            {stat("Avg / Event",     data.avgRevenue?`$${data.avgRevenue}`:"-","text-coffeeBrown")}
          </div>

          {data.recentEvents?.length>0 && (
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
              <div className="bg-kaiBurgundy/5 px-4 py-3 border-b">
                <h3 className="font-serif text-kaiBurgundy text-base font-semibold">Recent Events</h3>
              </div>
              <div className="divide-y divide-gray-50">
                {data.recentEvents.map((ev,i)=>(
                  <div key={i} className="px-4 py-3 flex justify-between items-center">
                    <div>
                      <div className="font-semibold text-sm text-gray-800">{ev.eventName}</div>
                      <div className="text-xs text-gray-400">{ev.date}{ev.location?` · ${ev.location}`:""}</div>
                    </div>
                    <div className="text-right">
                      <div className="text-sm font-bold text-kaiGreen">{ev.totalSales?`$${ev.totalSales}`:"-"}</div>
                      <div className="text-xs text-gray-400">{ev.signups} signups</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {data.topProducts?.length>0 && (
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
              <div className="bg-kaiGreen/5 px-4 py-3 border-b">
                <h3 className="font-serif text-kaiGreen text-base font-semibold">Top Sellers</h3>
              </div>
              <div className="divide-y divide-gray-50">
                {data.topProducts.map((p,i)=>(
                  <div key={i} className="px-4 py-2.5 flex justify-between items-center">
                    <span className="text-sm text-gray-700">{i+1}. {p.product}</span>
                    <span className="text-sm font-bold">{p.qty} sold</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {data.stockLevels && (
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
              <div className="bg-kaiBlue/5 px-4 py-3 border-b">
                <h3 className="font-serif text-kaiBlue text-base font-semibold">Stock Levels</h3>
              </div>
              <div className="divide-y divide-gray-50">
                {STOCK_ITEMS.map(item=>{
                  const level=data.stockLevels[item];
                  const low=typeof level==="number"&&level<=2;
                  return (
                    <div key={item} className="flex items-center px-4 py-2.5 gap-2">
                      <span className="flex-1 text-sm text-gray-700">{item}</span>
                      {low && <span className="text-xs bg-red-100 text-red-600 px-2 py-0.5 rounded-full font-medium">Low</span>}
                      <span className={`text-sm font-bold ${low?"text-red-500":"text-gray-700"}`}>{level??"-"}</span>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────
// ROOT APP
// ─────────────────────────────────────────────
function App() {
  const [webAppUrl,  setWebAppUrl]  = useState(localStorage.getItem(WEB_APP_KEY)||"");
  const [configured, setConfigured] = useState(!!localStorage.getItem(WEB_APP_KEY));
  const [screen,     setScreen]     = useState("home");
  const hasActiveEvent = !!loadEvent();

  const saveUrl = url => {
    localStorage.setItem(WEB_APP_KEY, url);
    setWebAppUrl(url);
    setConfigured(true);
  };

  if (!configured) return <SetupScreen onSave={saveUrl}/>;

  if (screen==="event")     return <EventScreen     webAppUrl={webAppUrl} onBack={()=>setScreen("home")}/>;
  if (screen==="stock")     return <StockScreen     webAppUrl={webAppUrl} onBack={()=>setScreen("home")}/>;
  if (screen==="dashboard") return <DashboardScreen webAppUrl={webAppUrl} onBack={()=>setScreen("home")}/>;

  return <HomeScreen onNav={setScreen} onSettings={()=>setConfigured(false)} hasActiveEvent={hasActiveEvent}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
